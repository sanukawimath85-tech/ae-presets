<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EditingFlow | Asset Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&family=Space+Mono:wght@700&display=swap');
        
        :root {
            --neon-blue: #00eeff;
            --dark-bg: #050505;
        }

        body { 
            background-color: var(--dark-bg); 
            color: #fff; 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            margin: 0;
            min-height: 100vh;
        }

        .glass { 
            background: rgba(255, 255, 255, 0.03); 
            border: 1px solid rgba(255, 255, 255, 0.08); 
            backdrop-filter: blur(20px); 
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        /* BIG CYAN RETURN BUTTON */
        .return-btn {
            font-family: 'Space Mono', monospace;
            font-size: 22px;
            letter-spacing: 2px;
            color: var(--neon-blue);
            display: flex;
            align-items: center;
            gap: 15px;
            text-transform: uppercase;
            padding: 15px 30px;
            border-radius: 15px;
            background: rgba(0, 238, 255, 0.05);
            border: 2px solid var(--neon-blue);
            cursor: pointer;
            box-shadow: 0 0 15px rgba(0, 238, 255, 0.2);
        }

        .return-btn:hover {
            background: var(--neon-blue);
            color: #000;
            transform: translateX(-10px);
        }

        .flow-text { 
            background: linear-gradient(135deg, #fff 0%, var(--neon-blue) 100%); 
            -webkit-background-clip: text; 
            -webkit-text-fill-color: transparent; 
            font-weight: 800;
        }

        .portal-card { 
            border-radius: 48px; 
            border: 1px solid rgba(255, 255, 255, 0.05);
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            padding: 3.5rem;
            transition: all 0.4s ease;
            height: 100%;
        }

        .active-card { cursor: pointer; }
        .active-card:hover { 
            border-color: var(--neon-blue); 
            background: rgba(0, 238, 255, 0.05);
            transform: translateY(-10px);
        }

        .emoji-icon {
            font-size: 80px;
            margin-bottom: 2rem;
            filter: drop-shadow(0 0 10px rgba(0, 238, 255, 0.3));
        }

        .status-tag {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #555;
            padding: 10px 30px;
            border-radius: 99px;
            font-size: 11px;
            font-weight: 800;
            text-transform: uppercase;
            margin-top: auto;
        }

        #credit-bar {
            background: linear-gradient(90deg, transparent, rgba(0, 238, 255, 0.1), transparent);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            padding: 12px 0; text-align: center; font-size: 10px; font-weight: 700;
            letter-spacing: 0.3em; text-transform: uppercase; color: var(--neon-blue);
            width: 100%;
        }

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="credit-bar" class="hidden">Verified Distribution & Assets by YoungTV</div>

    <div class="max-w-7xl mx-auto px-6 py-20">
        
        <header id="main-header" class="text-center mb-20">
            <h1 class="text-7xl md:text-8xl flow-text tracking-tighter uppercase mb-2">EditingFlow</h1>
            <p class="text-zinc-500 text-[10px] tracking-[0.6em] font-bold uppercase italic">Universal Asset Hub</p>
        </header>

        <div id="main-hub" class="grid grid-cols-1 md:grid-cols-3 gap-8">
            
            <div onclick="openEditing()" class="portal-card glass active-card">
                <div class="emoji-icon">🎬</div>
                <h2 class="text-3xl font-black uppercase tracking-tighter mb-2 leading-tight">Editing<br>Pack</h2>
                <p class="text-zinc-400 text-[11px] font-bold uppercase tracking-widest">Plugins & Presets</p>
                <div class="status-tag" style="color: var(--neon-blue); border-color: var(--neon-blue);">Enter</div>
            </div>

            <div class="portal-card glass">
                <div class="emoji-icon">🎮</div>
                <h2 class="text-3xl font-black uppercase tracking-tighter mb-2 leading-tight">Bloodstrike<br>Clips</h2>
                <p class="text-zinc-400 text-[11px] font-bold uppercase tracking-widest">Raw Gameplay Edits</p>
                <div class="status-tag">Coming Soon</div>
            </div>

            <div class="portal-card glass">
                <div class="emoji-icon">💎</div>
                <h2 class="text-3xl font-black uppercase tracking-tighter mb-2 leading-tight">Upload<br>Method</h2>
                <p class="text-zinc-400 text-[11px] font-bold uppercase tracking-widest leading-relaxed">
                    No-Loss Settings for<br>
                    <span class="text-cyan-400">TikTok • Instagram • Facebook</span>
                </p>
                <div class="status-tag">Locked</div>
            </div>

        </div>

        <div id="editing-view" class="hidden">
            <div class="flex flex-col md:flex-row justify-between items-center mb-16 gap-8">
                <button onclick="closeEditing()" class="return-btn">← RETURN</button>
                <input type="text" id="assetSearch" onkeyup="filterAssets()" placeholder="Search assets..." 
                       class="bg-white/5 border border-white/10 px-8 py-4 rounded-2xl w-full md:w-80 text-sm outline-none focus:border-cyan-400">
            </div>
            <div id="assetContainer" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
                </div>
        </div>

    </div>

    <script>
        const assetList = ["BCC 2024", "AfterCodecs", "Deep Glow", "Element 3D", "RSMB Pro", "Sapphire 2024", "Twixtor", "Universe", "VFX Suite"];

        function openEditing() {
            document.getElementById('main-hub').classList.add('hidden');
            document.getElementById('main-header').classList.add('hidden');
            document.getElementById('editing-view').classList.remove('hidden');
            document.getElementById('credit-bar').classList.remove('hidden');
            
            const container = document.getElementById('assetContainer');
            container.innerHTML = assetList.map(name => `
                <div class="glass p-10 rounded-[32px] border border-white/5 text-center">
                    <h3 class="font-bold uppercase text-sm mb-4 text-white">${name}</h3>
                    <p class="text-cyan-400 text-[11px] font-black tracking-widest">PASSWORD: youngtv</p>
                </div>
            `).join('');
        }

        function closeEditing() {
            document.getElementById('editing-view').classList.add('hidden');
            document.getElementById('credit-bar').classList.add('hidden');
            document.getElementById('main-hub').classList.remove('hidden');
            document.getElementById('main-header').classList.remove('hidden');
        }

        function filterAssets() {
            let input = document.getElementById('assetSearch').value.toLowerCase();
            let cards = document.getElementById('assetContainer').children;
            for (let card of cards) {
                let name = card.querySelector('h3').innerText.toLowerCase();
                card.style.display = name.includes(input) ? "block" : "none";
            }
        }
    </script>
</body>
</html>
