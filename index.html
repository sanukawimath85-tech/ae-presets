<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EditingFlow | Universal Asset Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&family=Space+Mono:wght@700&display=swap');
        
        :root {
            --neon-blue: #00eeff;
            --dark-bg: #050505;
        }

        body { 
            background-color: var(--dark-bg); 
            color: #fff; 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            margin: 0;
            overflow-x: hidden;
        }

        .glass { 
            background: rgba(255, 255, 255, 0.03); 
            border: 1px solid rgba(255, 255, 255, 0.08); 
            backdrop-filter: blur(20px); 
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        /* BIG VISIBLE RETURN BUTTON */
        .return-btn {
            font-family: 'Space Mono', monospace;
            font-size: 20px;
            letter-spacing: 2px;
            color: #888;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 15px;
            text-transform: uppercase;
            padding: 12px 24px;
            border-radius: 15px;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .return-btn:hover {
            color: var(--neon-blue);
            background: rgba(0, 238, 255, 0.08);
            border-color: var(--neon-blue);
            transform: translateX(-8px);
        }

        .flow-text { 
            background: linear-gradient(135deg, #fff 0%, var(--neon-blue) 100%); 
            -webkit-background-clip: text; 
            -webkit-text-fill-color: transparent; 
            font-weight: 800;
        }

        .hub-grid {
            display: grid;
            grid-template-columns: repeat(1, minmax(0, 1fr));
            gap: 2rem;
            width: 100%;
        }

        @media (min-width: 768px) {
            .hub-grid { grid-template-columns: repeat(3, minmax(0, 1fr)); }
        }

        .portal-card { 
            cursor: pointer; 
            position: relative; 
            border-radius: 48px; 
            border: 1px solid rgba(255, 255, 255, 0.05);
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            padding: 3.5rem;
            height: 100%;
        }

        .portal-card:hover { 
            border-color: var(--neon-blue); 
            background: rgba(0, 238, 255, 0.05);
            transform: translateY(-10px);
        }

        .emoji-icon {
            font-size: 80px;
            line-height: 1;
            margin-bottom: 2rem;
            filter: drop-shadow(0 0 10px rgba(0, 238, 255, 0.2));
        }

        .status-tag {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #555;
