<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BT ARCHIVE | AE PRESETS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { background: #050505; color: #fff; font-family: 'Inter', sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.1); backdrop-filter: blur(10px); }
        .neon-border { border-bottom: 2px solid #00eeff; box-shadow: 0 4px 15px -5px rgba(0, 238, 255, 0.4); }
        .preset-card:hover { border-color: #00eeff; background: rgba(0, 238, 255, 0.02); transform: translateY(-2px); transition: 0.3s; }
    </style>
</head>
<body oncontextmenu="return false;">

    <div class="w-full flex justify-center py-4 bg-black border-b border-zinc-900">
        <div class="text-[10px] text-zinc-600 tracking-widest uppercase italic">Advertisement</div>
    </div>

    <div class="max-w-5xl mx-auto px-6">
        <header class="py-16 text-left">
            <h1 class="text-7xl font-black tracking-tighter uppercase italic">
                BT <span class="text-[#00eeff]">VLT</span>
            </h1>
            <div class="flex items-center gap-4 mt-2">
                <p class="text-zinc-500 text-xs tracking-[0.2em] uppercase font-bold">Boyka x Thivi Archive</p>
                <div class="h-[1px] w-20 bg-zinc-800"></div>
            </div>
        </header>

        <div class="sticky top-6 z-50 mb-12">
            <input type="text" id="search" placeholder="SEARCH ASSETS..." 
                class="w-full p-5 glass rounded-xl text-white outline-none focus:border-[#00eeff] tracking-widest text-sm transition-all uppercase">
        </div>

        <div id="grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            </div>
    </div>

    <div class="w-full flex justify-center py-20 mt-20 border-t border-zinc-900">
        <div class="text-[10px] text-zinc-600 tracking-widest uppercase italic">Advertisement</div>
    </div>

    <script>
        // ADD YOUR PAYHIP LINKS HERE
        const presets = [
            { n: "ULTIMATE CC PACK", c: "COLOR", l: "#" },
            { n: "VELOCITY SHAKES", c: "MOTION", l: "#" },
            { n: "DEEP GLOW SETTINGS", c: "PLUGINS", l: "#" },
            { n: "TRANSITION BUNDLE", c: "FX", l: "#" },
            { n: "RENDER SETTINGS", c: "SYSTEM", l: "#" },
            { n: "TEXT ANIMATIONS", c: "PRESETS", l: "#" }
        ];

        const grid = document.getElementById('grid');
        const search = document.getElementById('search');

        function render(items) {
            grid.innerHTML = items.map(i => `
                <div class="preset-card glass p-8 rounded-2xl flex flex-col justify-between border border-white/5 h-full">
                    <div>
                        <span class="text-[9px] font-black text-[#00eeff] tracking-[0.3em] uppercase">${i.c}</span>
                        <h3 class="text-xl font-bold mt-2 tracking-tight">${i.n}</h3>
                    </div>
                    <a href="${i.l}" target="_blank" class="mt-8 block w-full text-center py-3 bg-white text-black text-xs font-black tracking-widest uppercase hover:bg-[#00eeff] transition-all rounded-sm">
                        Get Asset
                    </a>
                </div>
            `).join('');
        }

        search.oninput = (e) => {
            const val = e.target.value.toLowerCase();
            render(presets.filter(p => p.n.toLowerCase().includes(val) || p.c.toLowerCase().includes(val)));
        };

        render(presets);

        // Security
        document.addEventListener('contextmenu', e => e.preventDefault());
    </script>
</body>
</html>
