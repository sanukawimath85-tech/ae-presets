<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EditingFlow | AE Assets</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { background: #050505; color: #fff; font-family: 'Inter', sans-serif; -webkit-user-select: none; user-select: none; }
        .glass { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.1); backdrop-filter: blur(10px); }
        .preset-card:hover { border-color: #00eeff; background: rgba(0, 238, 255, 0.02); transform: translateY(-2px); transition: 0.3s; }
        .flow-text { background: linear-gradient(to right, #fff, #00eeff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .section-title { letter-spacing: 0.4em; color: #333; font-weight: 900; margin-bottom: 24px; border-l-2 border-[#00eeff] pl-4; text-transform: uppercase; font-size: 0.75rem; }
    </style>
</head>
<body oncontextmenu="return false;">

    <div class="w-full flex justify-center py-4 bg-black border-b border-zinc-900">
        <div class="text-[10px] text-zinc-600 tracking-widest uppercase italic font-bold">Advertisement</div>
    </div>

    <div class="max-w-6xl mx-auto px-6 pb-20">
        <header class="py-16 text-left">
            <h1 class="text-7xl font-black tracking-tighter uppercase italic flow-text">EditingFlow</h1>
            <div class="flex items-center gap-4 mt-2">
                <p class="text-zinc-500 text-xs tracking-[0.2em] uppercase font-bold">Premium AE Assets • Boyka x Thivi</p>
                <div class="h-[1px] w-20 bg-zinc-800"></div>
            </div>
        </header>

        <div id="sections-container" class="space-y-16"></div>
    </div>

    <div class="w-full flex justify-center py-20 mt-20 border-t border-zinc-900">
        <div class="text-[10px] text-zinc-600 tracking-widest uppercase italic font-bold">Advertisement</div>
    </div>

    <script>
        // THE ITEMS LIST
        // I updated the "l" to match your actual filename on GitHub
        const items = [
            { 
                n: "GLITCHIFY (ZIP)", 
                c: "PLUGINS", 
                l: "Glitchify (EditingFlow).zip" 
            }
        ];

        const container = document.getElementById('sections-container');
        const categories = [...new Set(items.map(i => i.c))];

        container.innerHTML = categories.map(cat => `
            <section>
                <h2 class="section-title">${cat}</h2>
                <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                    ${items.filter(i => i.c === cat).map(item => `
                        <div class="preset-card glass p-8 rounded-2xl flex flex-col justify-between border border-white/5">
                            <h3 class="text-xl font-bold tracking-tight uppercase">${item.n}</h3>
                            <a href="${item.l}" download class="mt-8 block w-full text-center py-3 bg-white text-black text-xs font-black tracking-widest uppercase hover:bg-[#00eeff] transition-all rounded-sm">
                                Get Asset
                            </a>
                        </div>
                    `).join('')}
                </div>
            </section>
        `).join('');
    </script>
</body>
</html>
