<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EditingFlow | Universal Asset Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&family=Space+Mono:wght@700&display=swap');
        
        :root {
            --neon-blue: #00eeff;
            --dark-bg: #050505;
        }

        body { 
            background-color: var(--dark-bg); 
            color: #fff; 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            margin: 0;
            overflow-x: hidden;
        }

        .glass { 
            background: rgba(255, 255, 255, 0.03); 
            border: 1px solid rgba(255, 255, 255, 0.08); 
            backdrop-filter: blur(20px); 
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        /* --- BIG VISIBLE RETURN BUTTON --- */
        .return-btn {
            font-family: 'Space Mono', monospace;
            font-size: 20px;
            letter-spacing: 2px;
            color: #888;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 15px;
            text-transform: uppercase;
            padding: 12px 24px;
            border-radius: 15px;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .return-btn:hover {
            color: var(--neon-blue);
            background: rgba(0, 238, 255, 0.08);
            border-color: var(--neon-blue);
            transform: translateX(-8px);
        }

        .flow-text { 
            background: linear-gradient(135deg, #fff 0%, var(--neon-blue) 100%); 
            -webkit-background-clip: text; 
            -webkit-text-fill-color: transparent; 
            font-weight: 800;
        }

        .portal-card { cursor: pointer; position: relative; border-radius: 48px; border: 1px solid rgba(255, 255, 255, 0.05); }
        .portal-card:hover { 
            border-color: var(--neon-blue); 
            background: rgba(0, 238, 255, 0.05);
            transform: translateY(-10px);
        }

        /* Emoji Icon Styling */
        .emoji-icon {
            font-size: 80px;
            line-height: 1;
            margin-bottom: 1.5rem;
            filter: drop-shadow(0 0 10px rgba(0, 238, 255, 0.2));
        }

        .status-tag {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #555;
            padding: 8px 24px;
            border-radius: 99px;
            font-size: 10px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 2rem;
        }

        #credit-bar {
            background: linear-gradient(90deg, transparent, rgba(0, 238, 255, 0.1), transparent);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            padding: 12px 0; text-align: center; font-size: 10px; font-weight: 700;
            letter-spacing: 0.3em; text-transform: uppercase; color: var(--neon-blue);
        }

        .hidden { display: none !important; }
        .animate-fade { animation: fadeIn 0.5s ease forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div id="credit-bar" class="hidden">Verified Distribution & Assets by YoungTV</div>

    <div class="max-w-7xl mx-auto px-6 py-24 min-h-screen flex flex-col">
        
        <header id="main-header" class="text-center mb-24">
            <h1 class="text-7xl md:text-8xl flow-text tracking-tighter uppercase mb-2">EditingFlow</h1>
            <p class="text-zinc-500 text-[10px] tracking-[0.6em] font-bold uppercase">Universal Asset Hub</p>
        </header>

        <main class="flex-grow">
            <div id="main-hub" class="grid grid-cols-1 md:grid-cols-3 gap-8 animate-fade">
                
                <div onclick="showSection('editing')" class="portal-card glass p-12 flex flex-col items-center text-center">
                    <div class="emoji-icon">🎬</div>
                    <h2 class="text-3xl font-black uppercase tracking-tighter mb-2 leading-tight">Editing<br>Section</h2>
                    <p class="text-zinc-500 text-[11px] font-bold uppercase
