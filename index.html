<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EditingFlow | Universal Asset Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        
        :root {
            --neon-blue: #00eeff;
            --dark-bg: #050505;
        }

        body { 
            background-color: var(--dark-bg); 
            color: #fff; 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            margin: 0;
        }

        .glass { 
            background: rgba(255, 255, 255, 0.03); 
            border: 1px solid rgba(255, 255, 255, 0.08); 
            backdrop-filter: blur(20px); 
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .flow-text { 
            background: linear-gradient(135deg, #fff 0%, var(--neon-blue) 100%); 
            -webkit-background-clip: text; 
            -webkit-text-fill-color: transparent; 
        }

        .portal-card { cursor: pointer; position: relative; height: 100%; border-radius: 48px; }
        .portal-card:hover { 
            border-color: var(--neon-blue); 
            background: rgba(0, 238, 255, 0.05);
            transform: translateY(-10px);
        }

        /* Asset Styling */
        .asset-icon { width: 80px; height: 80px; margin-bottom: 2rem; object-fit: contain; }
        .character-art { width: 120px; height: 120px; border-radius: 24px; margin-bottom: 1.5rem; object-fit: cover; }

        .status-btn {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #555;
            padding: 8px 24px;
            border-radius: 99px;
            font-size: 10px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 2rem;
        }

        #credit-bar {
            background: linear-gradient(90deg, transparent, rgba(0, 238, 255, 0.1), transparent);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            padding: 12px 0; text-align: center; font-size: 10px; font-weight: 700;
            letter-spacing: 0.3em; text-transform: uppercase; color: var(--neon-blue);
        }

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="credit-bar" class="hidden">Verified Distribution & Assets by YoungTV</div>

    <div class="max-w-7xl mx-auto px-6 py-24 min-h-screen">
        
        <header class="text-center mb-24">
            <h1 class="text-7xl md:text-8xl font-black flow-text tracking-tighter uppercase mb-2">EditingFlow</h1>
            <p id="sub-header" class="text-zinc-500 text-[10px] tracking-[0.6em] font-bold uppercase">Universal Asset Hub</p>
        </header>

        <div id="main-hub" class="grid grid-cols-1 md:grid-cols-3 gap-8">
            
            <div onclick="showSection('editing')" class="portal-card glass p-12 flex flex-col items-center text-center">
                <div class="text-6xl mb-6">🎬</div>
                <h2 class="text-3xl font-black uppercase tracking-tighter mb-2">Editing<br>Section</h2>
                <p class="text-zinc-500 text-[10px] font-bold uppercase tracking-widest">Plugins & Presets</p>
                <div class="status-btn" style="color: var(--neon-blue); border-color: var(--neon-blue);">Enter</div>
            </div>

            <div onclick="showSection('clips')" class="portal-card glass p-12 flex flex-col items-center text-center">
                <img src="https://i.ibb.co/XfR0X97/bloodstrike-mask.png" class="character-art" alt="Blood Strike Art">
                <h2 class="text-3xl font-black uppercase tracking-tighter mb-2">Blood Strike<br>Clips</h2>
                <p class="text-zinc-500 text-[10px] font-bold uppercase tracking-widest">Raw Gameplay Edits</p>
                <div class="status-btn">Coming Soon</div>
            </div>

            <div onclick="showSection('export')" class="portal-card glass p-12 flex flex-col items-center text-center">
                <div class="text-6xl mb-6">🛡️</div>
                <h2 class="text-3xl font-black uppercase tracking-tighter mb-2">Quality<br>Guard</h2>
                <p class="text-zinc-500 text-[10px] font-bold uppercase tracking-widest leading-relaxed">No-Loss High Quality<br>Uploading Methods</p>
                <div class="status-btn">Coming Soon</div>
            </div>

        </div>

        <div id="editing-view" class="hidden">
            <div class="flex justify-between items-center mb-12">
                <button onclick="showHub()" class="text-zinc-500 hover:text-white font-bold uppercase text-[10px] tracking-widest">← Return</button>
                <input type="text" id="pluginSearch" onkeyup="filterPlugins()" placeholder="Search..." 
                       class="bg-white/5 border border-white/10 px-6 py-4 rounded-2xl w-64 text-sm outline-none">
            </div>
            <div id="pluginContainer" class="grid grid-cols-1 md:grid-cols-3 gap-6"></div>
        </div>

    </div>

    <script>
        const assets = ["BCC 2024", "AfterCodecs", "Deep Glow", "Element 3D", "RSMB Pro", "Sapphire 2024", "Twixtor", "Universe", "VFX Suite"];

        function renderCards() {
            const container = document.getElementById('pluginContainer');
            container.innerHTML = assets.map(name => `
                <div class="glass p-8 rounded-[32px] portal-card group text-center">
                    <h3 class="font-bold uppercase text-xs mb-4 group-hover:text-cyan-400">${name}</h3>
                    <p class="text-cyan-400 text-[10px] font-black tracking-widest">PASSWORD: youngtv</p>
                </div>
            `).join('');
        }

        function showSection(s) {
            document.getElementById('main-hub').classList.add('hidden');
            if(s === 'editing') {
                document.getElementById('editing-view').classList.remove('hidden');
                document.getElementById('credit-bar').classList.remove('hidden');
                renderCards();
            }
        }

        function showHub() {
            document.getElementById('editing-view').classList.add('hidden');
            document.getElementById('credit-bar').classList.add('hidden');
            document.getElementById('main-hub').classList.remove('hidden');
        }
    </script>
</body>
</html>
