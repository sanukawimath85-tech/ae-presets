<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EditingFlow | Premium Assets</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap');
        body { background: #000; color: #fff; font-family: 'Inter', sans-serif; overflow-x: hidden; }
        .glass { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.1); backdrop-filter: blur(10px); }
        .flow-text { background: linear-gradient(to right, #fff, #00eeff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .category-btn { border: 2px solid #00eeff22; transition: 0.3s; cursor: pointer; }
        .category-btn:hover { border-color: #00eeff; background: rgba(0, 238, 255, 0.05); transform: translateY(-5px); }
        .hidden { display: none !important; }
        /* Improved readability for the plugin titles */
        .plugin-title { font-size: 1.25rem; font-weight: 800; letter-spacing: -0.02em; color: #f4f4f5; text-transform: uppercase; }
    </style>
</head>
<body class="p-6 md:p-20">

    <div class="max-w-6xl mx-auto">
        <header class="text-center mb-20">
            <h1 class="text-6xl md:text-8xl font-black italic flow-text uppercase tracking-tighter">EditingFlow</h1>
            <p class="text-zinc-500 text-xs tracking-[0.5em] uppercase font-bold mt-4">Boyka x Thivi • Premium Editing Assets</p>
        </header>

        <div id="main-menu" class="grid grid-cols-1 md:grid-cols-2 gap-10">
            <div onclick="showPlugins()" class="category-btn glass p-20 rounded-[40px] flex flex-col items-center justify-center">
                <span class="text-6xl mb-6">📁</span>
                <h2 class="text-3xl font-black uppercase tracking-widest">Plugins</h2>
            </div>

            <div class="glass p-20 rounded-[40px] flex flex-col items-center justify-center opacity-30 cursor-not-allowed">
                <span class="text-6xl mb-6">💻</span>
                <h2 class="text-3xl font-black uppercase tracking-widest">Apps</h2>
                <span class="mt-4 px-4 py-1 border border-[#00eeff] text-[#00eeff] text-[10px] font-bold rounded">COMING SOON</span>
            </div>
        </div>

        <div id="plugins-view" class="hidden">
            <div class="flex items-center justify-between mb-12">
                <button onclick="showMenu()" class="text-zinc-400 hover:text-[#00eeff] font-bold uppercase text-xs tracking-widest transition-colors">← Back to Menu</button>
                <span class="text-zinc-600 text-xs font-bold tracking-widest uppercase">Select an Asset to Download</span>
            </div>
            
            <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
                <script>
                    // Updated list: Removed After Effects 2020
                    const assets = [
                        "AfterCodecs.v1.7.2.EditingFlow", "Bokeh.Win.EditingFlow", "BorisFX.Mocha.Pro.EditingFlow",
                        "ClearPlus", "Deep.Glow.2.1.0.2.EditingFlow", "Deep.Glow.V1.Win.EditingFlow",
                        "Element.3D.WIN.EditingFlow", "EZCO-CRT-EMULATOR.EditingFlow", "Flow.1.4.2.EditingFlow",
                        "Flow.v1.5.2.EditingFlow", "FXConsole_1.0.5_Installer_x64.EditingFlow", "Influx.v1.3.0.EditingFlow",
                        "Instant.4K.EditingFlow", "Magic.Bullet.Looks.2024.EditingFlow", "Omino.EditingFlow",
                        "OpticalFlares.EditingFlow", "Pro.Shaders.EditingFlow", "RSMB.Pro.EditingFlow",
                        "Saber.EditingFlow", "Sapphire.2024.EditingFlow", "Signal.EditingFlow",
                        "Trapcode.Suite.2024.EditingFlow", "Twixtor.EditingFlow", "Twitch.EditingFlow",
                        "universe.EditingFlow", "VFX.Suite.EditingFlow"
                    ];

                    document.write(assets.map(name => {
                        // Clean up the name for display (Remove dots and "EditingFlow")
                        const displayName = name.replace(/\./g, ' ').replace('EditingFlow', '').trim();
                        
                        return `
                        <div class="glass p-8 rounded-3xl flex flex-col justify-between hover:border-[#00eeff66] transition-all group">
                            <div>
                                <h3 class="plugin-title group-hover:text-[#00eeff] transition-colors">${displayName}</h3>
                                <p class="text-[#00eeff] text-[9px] font-black mt-2 uppercase tracking-[0.2em] opacity-70">Premium Asset</p>
                            </div>
                            <a href="https://github.com/EditingFlow2/ae-presets/releases/download/v1.0/${name}.zip" 
                               download 
                               class="mt-8 block w-full text-center py-4 bg-white text-black text-xs font-black tracking-widest uppercase hover:bg-[#00eeff] transition-all rounded-2xl">
                               Download Now
                            </a>
                        </div>
                        `;
                    }).join(''));
                </script>
            </div>
        </div>
    </div>

    <script>
        function showPlugins() {
            document.getElementById('main-menu').classList.add('hidden');
            document.getElementById('plugins-view').classList.remove('hidden');
            window.scrollTo(0, 0);
        }

        function showMenu() {
            document.getElementById('plugins-view').classList.add('hidden');
            document.getElementById('main-menu').classList.remove('hidden');
            window.scrollTo(0, 0);
        }
    </script>

</body>
</html>
